  <div class="hello1">

     <div class="tt1">

        <input id="fullname" class="input" type="text" placeholder="" required />

     </div>
     <div class="tt13">
        <label class="label1">Số Điện Thoại    </label>
        <input id="sdt" class="input" type="text" placeholder="" required />

     </div>
     <div class="tt2">
        <div class="tt211">
           <label class="label1">Giới Tính    </label>
          <input  id="gender" class="input" type="text" placeholder="" required />
        </div>
        <div class="tt212">
           <label class="label1">Ngày Sinh    </label>
          <input  id="ns"class="input" type="date" placeholder="" required />
        </div>

    <button  type="submit">Đăng Ký</button>

  <section class="tieude">
    <div class="info6">
        <h2>Phim Hay</h2>
        <p>Web Được làm bởi Dương Văn Đạt</p>
    </div>
 </section>
 <script>
  const API_BASE = "http://localhost:8080";

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const phone = document.getElementById("sdt").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value; // nên để input type="password"
    const fullName = document.getElementById("fullname").value.trim();
    const gender = document.getElementById("gender").value.trim(); // nếu backend là Enum thì phải đúng giá trị
    const dateOfBirth = document.getElementById("ns").value; // "yyyy-MM-dd"

    try {
      const res = await fetch(`${API_BASE}/api/add`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password, gender, phone, fullName, dateOfBirth })
      });

      console.log("status:", res.status);
      const text = await res.text();
      console.log("response:", text);

      if (!res.ok) {
        alert("Đăng ký thất bại: " + text);
        return;
      }

      alert("Đăng ký thành công!");
      window.location.href = "index.html";
    } catch (err) {
      console.error(err);
      alert("Không kết nối được backend.");
    }
  });
</script></body>
